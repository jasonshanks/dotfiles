[cmd_duration]
format = "[$duration]($style) "
style = "fg:yellow"

[directory]
style = "fg:blue"

[git_branch]
format = "[$branch]($style) "
style = "bright-black"

[git_metrics]
format = '([Ō¢┤$added]($added_style))([Ō¢┐$deleted]($deleted_style)) '
added_style = 'italic dimmed fg:green'
deleted_style = 'italic dimmed fg:red'
ignore_submodules = true
disabled = true

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "fg:maroon"
conflicted = "="
untracked = "?"
modified = "!"
staged = "+"
renamed = "¾░æĢ"
deleted = "¾░Ś©"
stashed = "¾░ĄĄ"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[python]
format = "[$virtualenv]($style) "
style = "bright-black"
detect_extensions = []
detect_files = []

[username]
show_always = false
style_user = "fg:white"
style_root = "fg:red"
format = '[ $user]($style) '

