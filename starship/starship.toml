OpenCloudOS = "ΎΝγ"
openEuler = "ΎΝγ"
openSUSE = "ΎΝΦ"
OracleLinux = "≤░║κ"
PikaOS = "ΎΝγ"
Pop = "ΎΝς"
Raspbian = "ΎΝΧ"
Redhat = "≤▒Εδ"
RedHatEnterprise = "≤▒Εδ"
Redox = "≤░Αα"
RockyLinux = "ΎΝτ"
Solus = "ΎΝφ"
