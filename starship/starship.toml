[character]
success_symbol = "[έζψ](fg:purple)"
error_symbol = "[έζψ](fg:red)"
vimcmd_symbol = "[έζχ](fg:green)"

[cmd_duration]
format = "[$duration]($style) "
style = "fg:yellow"

[directory]
style = "fg:blue"

[git_branch]
format = "[$branch]($style) "
style = "bright-black"

[git_metrics]
format = '([έΨ┤$added]($added_style))([έΨ┐$deleted]($deleted_style)) '
added_style = 'italic dimmed fg:green'
deleted_style = 'italic dimmed fg:red'
ignore_submodules = true
disabled = true

[git_status]
format = "[[($conflicted$untracked$modified$staged$renamed$deleted)](218) ($ahead_behind$stashed)]($style)"
style = "fg:peach"
conflicted = "="
untracked = "?"
modified = "!"
staged = "+"
renamed = "≤░ΣΧ"
deleted = "≤░Ωρ"
stashed = "≤░╡╡"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[python]
format = "[$virtualenv]($style) "
style = "bright-black"
detect_extensions = []
detect_files = []

[username]
show_always = false
style_user = "fg:white"
style_root = "fg:red"
format = '[ $user]($style) '

