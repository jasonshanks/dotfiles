"$schema" = 'https://starship.rs/config-schema.json'

# Prompt: left-side
format = """
$os\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$git_metrics\
$line_break\
$python\
$username\
$character"""

right_format = """
$cmd_duration"""

