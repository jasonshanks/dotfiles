Emscripten = "Όγκ"
EndeavourOS = "ΎΝλ"
Fedora = "ΎΝΛ"
FreeBSD = "ΎΝΝ"
Garuda = "ΎΝ╖"
Gentoo = "ΎΝΞ"
HardenedBSD = "≤░ηΝ"
Illumos = "ΎΝο"
InstantOS = "ΎΝγ"
Ios = "≤░Α╖"
Kali = "ΎΝπ"
Linux = "ΎΝγ"
